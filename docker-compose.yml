services:
  audit-server:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; print(httpx.get('http://localhost:8000/health').status_code)"]
      interval: 30s
      timeout: 5s
      retries: 3
